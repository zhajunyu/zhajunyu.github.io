version: 5.1.0

variant: default

logo: 
    text: Junyu's Blog

head:
    favicon: /images/favicon.png
    
    # Web application manifests configuration
    # https://developer.mozilla.org/en-US/docs/Web/Manifest
    manifest:
        # Name of the web application (default to the site title)
        name: 
        # The displayed name of the web application
        # when there is not enough space to display full name
        short_name: 
        # The start URL of the web application
        start_url: 
        # The default theme color for the application
        theme_color: 
        # A placeholder background color for the application page to display
        # before its stylesheet is loaded
        background_color: 
        # The preferred display mode for the website
        display: standalone
        # Image files that can serve as application icons for different contexts
        icons:
            -
                # The path to the image file
                src: ''
                # A string containing space-separated image dimensions
                sizes: ''
                # A hint as to the media type of the image
                type: 
    
    # Open Graph metadata
    # https://hexo.io/docs/helpers.html#open-graph
    open_graph:
        title: 
        type: blog
        url: 
        image: 
        site_name: 
        author: 
        description: 
        # Twitter card type (twitter:card)
        twitter_card: 
        # Twitter ID (twitter:creator)
        twitter_id: 
        # Twitter Site (twitter:site)
        twitter_site: 
        # Google+ profile link (deprecated)
        google_plus: 
        # Facebook admin ID
        fb_admins: 
        # Facebook App ID
        fb_app_id: 
    # Structured data of the page
    # https://developers.google.com/search/docs/guides/intro-structured-data
    structured_data:
        title: 
        description: 
        url: 
        author: 
        publisher: 
        publisher_logo: 
        image: 
    # Additional HTML meta tags in an array
    meta:
        # Meta tag specified in <attribute>=<value> style
        # E.g., name=theme-color;content=#123456 => <meta name="theme-color" content="#123456">
        - ''
    # URL or path to the website's RSS atom.xml
    rss: 

navbar:
    menu:
        主页: /
        归档: /archives
        分类: /categories
        标签: /tags
        关于: /about
    links:
        在GitHub上查看主题:
            icon: fa-brands fa-github
            url: https://github.com/ppoffice/hexo-theme-icarus

footer:
    links:
        Creative Commons:
            icon: fab fa-creative-commons
            url: https://creativecommons.org/
        Attribution 4.0 International:
            icon: fab fa-creative-commons-by
            url: https://creativecommons.org/licenses/by/4.0/
        Download on GitHub:
            icon: fab fa-github
            url: https://github.com/ppoffice/hexo-theme-icarus

article:
    highlight:
        # Code highlight themes
        # https://github.com/highlightjs/highlight.js/tree/master/src/styles
        theme: atom-one-light
        clipboard: true
        fold: unfolded
    readtime: true
    update_time: true
    licenses:
        Creative Commons:
            icon: fa-brand fa-creative-commons
            url: https://creativecommons.org/
        Attribution:
            icon: fa-brand fa-creative-commons-by
            url: https://creativecommons.org/licenses/by/4.0/
        Noncommercial:
            icon: fa-brand fa-creative-commons-nc
            url: https://creativecommons.org/licenses/by-nc/4.0/

search:
    type: insight
    index_pages: true

sidebar:
    left:
        sticky: false
    right:
        sticky: false

widgets:
    # Profile
    -
        position: left
        type: profile
        author: Junyu Zha
        author_title: 学生
        location: 太阳系，地球
        avatar: /images/avatar.png
        avatar_rounded: true
        gravatar: 
        follow_link: https://github.com/zhajunyu
        social_links:
            Github:
                icon: fa-brands fa-github
                url: https://github.com/zhajunyu
            E-mail:
                icon: fa-solid fa-envelope
                url: mailto:zhajunyu@skylarkmail.com
            RSS:
                icon: fa-solid fa-rss
                url: /
    
    # Recommendation links
    -
        position: left
        type: links
        links:
            Hexo: https://hexo.io
   
    # Archives
    -
        position: left
        type: archives
   
    # Table of context
    -
        position: right
        type: toc
        index: true
        collapsed: true
        depth: 3
    
    # Recent posts
    -
        position: right
        type: recent_posts

    # Categories
    -
        position: right
        type: categories
    
    # Tags
    -
        position: right
        type: tags
        order_by: -length
        amount: 
        show_count: true

plugins:
    animejs: true
    back_to_top: true
    cookie_consent:
        # The compliance type. Can be "info", "opt-in", or "opt-out"
        type: info
        # Theme of the popup. Can be "block", "edgeless", or "classic"
        theme: edgeless
        static: false
        position: bottom-right
        policyLink: https://www.cookiesandyou.com/
    # Enable the lightGallery and Justified Gallery plugins
    gallery: true
    # Enable the KaTeX math typesetting support
    # https://katex.org/
    katex: false
    # Enable the MathJax math typesetting support
    # https://www.mathjax.org/
    mathjax: false
    outdated_browser: true
    pjax: true
    progressbar: true

providers:
    cdn: jsdelivr
    fontcdn: google
    iconcdn: fontawesome
